services:
  # Backend Service
  - type: web
    name: studyplanner-api
    runtime: docker
    repo: https://github.com/abhuvana17/ai_studyplanner
    context: studyplanner
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: POE_API_KEY
        sync: false

  # Frontend Service
  - type: web
    name: studyplanner-web
    runtime: static
    repo: https://github.com/abhuvana17/ai_studyplanner
    publishDir: studyplanner-frontend/dist
    plan: free
    buildCommand: cd studyplanner-frontend && npm install && npm run build
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: studyplanner-api
          type: web
          property: host
