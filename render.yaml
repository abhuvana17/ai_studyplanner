services:
  # Unified Monolithic AI Study Planner
  - type: web
    name: ai-studyplanner-unified
    runtime: docker
    repo: https://github.com/abhuvana17/ai_studyplanner
    context: .
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: POE_API_KEY
        sync: false
